    sdk: flutter
  string_similarity: ^2.1.1
  cupertino_icons: ^1.0.8

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.1

  image_picker: ^1.1.2
